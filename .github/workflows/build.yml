name: 🏗️ 构建验证

on:
  push:
    branches: [ master, main, develop ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # windows-latest 已预装 MSBuild + NuGet.exe + .NET Framework 4.8 SDK

      - name: 📦 还原 NuGet 包
        run: nuget restore KeJian.csproj -PackagesDirectory packages
        working-directory: .

      - name: 🏗️ 构建项目 (Release)
        run: msbuild KeJian.csproj /p:Configuration=Release /p:RestorePackagesPath=packages /p:WarningLevel=0
        working-directory: .

      - name: 🔍 收集构建产物
        id: collect
        run: |
          mkdir publish -Force
          $exe = Get-ChildItem -Recurse -Filter "KeJian.exe" -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Host "❌ 未找到 KeJian.exe"
            exit 1
          }
          $exe | ForEach-Object {
            Copy-Item $_.FullName "publish\"
            Write-Host "✅ 复制: $($_.FullName)"
          }
        shell: powershell

      - name: ✅ 验证产物
        run: |
          $file = Get-Item "publish\KeJian.exe"
          Write-Host "✅ 刻简 v1.0 构建成功"
          Write-Host "   大小: $([math]::Round($file.Length / 1KB, 1)) KB"
          Write-Host "   路径: $($file.FullName)"
        shell: powershell

      - name: 📦 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: KeJian-v1.0-windows
          path: publish/
          retention-days: 30
