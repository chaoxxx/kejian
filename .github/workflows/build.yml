name: 🏗️ 构建验证

on:
  push:
    branches: [ master, main, develop ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 📦 还原 NuGet 包
        run: dotnet restore
        working-directory: .

      - name: 🏗️ 构建项目 (Release)
        run: dotnet build -c Release --no-restore
        working-directory: .

      - name: 📤 发布单文件
        run: dotnet publish -c Release -o publish --no-build
        working-directory: .

      - name: ✅ 验证构建产物
        run: |
          $file = Get-Item "publish\KeJian.exe"
          Write-Host "✅ 刻简 v1.0 构建成功"
          Write-Host "   大小: $([math]::Round($file.Length / 1KB, 1)) KB"
          Write-Host "   路径: $($file.FullName)"
          Write-Host "   Costura 嵌入: 托管 DLL + WebView2Loader 原生 DLL 已内嵌到 exe"
          Write-Host ""
          Write-Host "⚠️  运行要求:"
          Write-Host "   - 系统: Windows 10 1803+ / Windows 11"
          Write-Host "   - WebView2 Runtime (Win10 已预装)"
          Write-Host "   - 如遇 SxS 错误: 安装 VC++ Redistributable"
        shell: powershell

      - name: 📦 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: KeJian-v1.0-windows
          path: publish/
          retention-days: 30
